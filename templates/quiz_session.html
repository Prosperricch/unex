<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>U-NEX • Quiz</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange:     #f97316;
      --orange-dk:  #ea580c;
      --orange-dim: rgba(249,115,22,0.12);
      --orange-bd:  rgba(249,115,22,0.30);
      --green:      #22c55e;
      --green-dim:  rgba(34,197,94,0.12);
      --green-bd:   rgba(34,197,94,0.30);
      --red:        #ef4444;
      --red-dim:    rgba(239,68,68,0.10);
      --red-bd:     rgba(239,68,68,0.28);
      --bg:         #0c0e14;
      --s1:         #13161f;
      --s2:         #191d28;
      --bd:         rgba(255,255,255,0.07);
      --bd2:        rgba(255,255,255,0.12);
      --txt:        #eef0f6;
      --txt2:       rgba(238,240,246,0.58);
      --txt3:       rgba(238,240,246,0.30);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--txt);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ════════════════════════════════
       TOP BAR — fixed, never wraps
    ════════════════════════════════ */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      height: 54px;
      background: rgba(12,14,20,0.97);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--bd);
      display: flex; align-items: center;
      padding: 0 16px; gap: 10px;
    }

    /* quiz title — shrinks so timer + submit never wrap */
    .tb-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem; font-weight: 800;
      color: var(--txt);
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tb-title em { color: var(--orange); font-style: normal; }

    /* timer — compact, never overflows */
    .timer {
      display: flex; align-items: center; gap: 5px;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 900;
      letter-spacing: 0.04em;
      color: var(--txt);
      background: var(--s1); border: 1px solid var(--bd2);
      padding: 5px 10px; border-radius: 8px;
      white-space: nowrap; flex-shrink: 0;
    }
    .timer .material-icons { font-size: 0.9rem; color: var(--txt3); flex-shrink: 0; }
    .timer.warn { color: var(--orange); border-color: var(--orange-bd); background: var(--orange-dim); }
    .timer.crit { color: var(--red);   border-color: var(--red-bd);   background: var(--red-dim);
                  animation: pulse .5s ease-in-out infinite alternate; }
    @keyframes pulse { from{opacity:1} to{opacity:.55} }

    /* progress text — hidden on very small screens */
    .tb-prog {
      font-size: 0.75rem; color: var(--txt2);
      white-space: nowrap; flex-shrink: 0;
    }
    .tb-prog strong { color: var(--txt); }

    /* submit button */
    .tb-submit {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 8px;
      font-size: 0.8rem; font-weight: 700;
      background: var(--orange); color: #fff;
      border: none; cursor: pointer; flex-shrink: 0;
      transition: background .2s;
    }
    .tb-submit:hover { background: var(--orange-dk); }
    .tb-submit .material-icons { font-size: 0.88rem; }

    /* ════════════════════════════════
       PAGE — below fixed topbar
    ════════════════════════════════ */
    .page {
      padding-top: 54px;          /* clear fixed topbar */
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ════════════════════════════════
       PROGRESS BAR — thin strip
    ════════════════════════════════ */
    .prog-bar-wrap {
      height: 3px; background: var(--bd);
      position: sticky; top: 54px; z-index: 200;
    }
    .prog-bar-fill {
      height: 100%; background: var(--orange);
      transition: width .3s ease;
    }

    /* ════════════════════════════════
       MAIN CONTENT — question + grid
    ════════════════════════════════ */
    .content {
      display: grid;
      grid-template-columns: 1fr 220px;
      flex: 1;
    }

    /* ── QUESTION PANEL ── */
    .q-panel {
      padding: 28px 24px 80px;
      overflow-y: auto;
      border-right: 1px solid var(--bd);
    }

    /* question header */
    .q-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 18px;
    }
    .q-num {
      font-family: 'Syne', sans-serif;
      font-size: 0.68rem; font-weight: 900;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--orange);
    }
    .q-badge {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 100px; border: 1px solid;
    }
    .qb-easy   { background: var(--green-dim); border-color: var(--green-bd); color: var(--green); }
    .qb-medium { background: rgba(234,179,8,.10); border-color: rgba(234,179,8,.28); color: #eab308; }
    .qb-hard   { background: var(--red-dim); border-color: var(--red-bd); color: var(--red); }
    .qb-course { background: var(--orange-dim); border-color: var(--orange-bd); color: var(--orange); }

    /* question text */
    .q-text {
      font-size: 1rem; font-weight: 500; line-height: 1.7;
      color: var(--txt); margin-bottom: 22px;
    }

    /* options */
    .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 24px; }

    .opt {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 14px; border-radius: 11px;
      border: 1.5px solid var(--bd2);
      background: rgba(255,255,255,0.025);
      cursor: pointer; user-select: none;
      transition: border-color .15s, background .15s;
    }
    .opt:hover         { border-color: var(--orange-bd); background: var(--orange-dim); }
    .opt.selected      { border-color: var(--orange-bd); background: var(--orange-dim); }
    .opt.correct-ans   { border-color: var(--green-bd);  background: var(--green-dim); }
    .opt.wrong-ans     { border-color: var(--red-bd);    background: var(--red-dim); }

    .opt-ltr {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--s2); border: 1px solid var(--bd2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 0.68rem; font-weight: 900; color: var(--txt2);
      flex-shrink: 0;
      transition: background .15s, border-color .15s, color .15s;
    }
    .opt.selected    .opt-ltr { background: var(--orange); border-color: var(--orange); color: #fff; }
    .opt.correct-ans .opt-ltr { background: var(--green);  border-color: var(--green);  color: #fff; }
    .opt.wrong-ans   .opt-ltr { background: var(--red);    border-color: var(--red);    color: #fff; }

    .opt-text { font-size: 0.88rem; line-height: 1.5; color: var(--txt2); padding-top: 1px; }
    .opt.selected    .opt-text,
    .opt.correct-ans .opt-text,
    .opt.wrong-ans   .opt-text { color: var(--txt); }

    /* practice explanation */
    .practice-expl {
      display: none;
      padding: 11px 14px; border-radius: 9px;
      background: var(--green-dim); border: 1px solid var(--green-bd);
      font-size: 0.8rem; line-height: 1.55; color: var(--txt2);
      margin-bottom: 16px;
    }
    .practice-expl.show { display: block; }
    .practice-expl strong { color: var(--green); }

    /* prev / next */
    .q-nav {
      display: flex; align-items: center; gap: 10px;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 9px;
      font-size: 0.83rem; font-weight: 600;
      border: 1px solid var(--bd2); background: var(--s1);
      color: var(--txt2); cursor: pointer;
      transition: all .18s;
    }
    .nav-btn:hover { background: var(--s2); color: var(--txt); }
    .nav-btn.primary { background: var(--orange); border-color: var(--orange); color: #fff; }
    .nav-btn.primary:hover { background: var(--orange-dk); }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
    .nav-btn .material-icons { font-size: 0.95rem; }

    /* ── GRID PANEL ── */
    .grid-panel {
      padding: 20px 14px;
      background: var(--s1);
      overflow-y: auto;
      position: sticky; top: 57px;    /* stick below topbar + progress bar */
      height: calc(100vh - 57px);
    }

    .gp-label {
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--txt3); margin-bottom: 10px;
    }

    .q-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      margin-bottom: 16px;
    }

    .gq {
      aspect-ratio: 1;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--bd);
      background: var(--s2); color: var(--txt3);
      transition: all .12s;
    }
    .gq:hover    { border-color: var(--bd2); color: var(--txt); }
    .gq.answered { background: var(--orange-dim); border-color: var(--orange-bd); color: var(--orange); }
    .gq.current  { background: var(--orange); border-color: var(--orange); color: #fff; }

    .gp-legend {
      display: flex; flex-direction: column; gap: 6px;
      margin-top: 14px;
    }
    .leg {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.68rem; color: var(--txt2);
    }
    .leg-dot {
      width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
    }
    .ld-now  { background: var(--orange); }
    .ld-done { background: var(--orange-dim); border: 1px solid var(--orange-bd); }
    .ld-skip { background: var(--s2); border: 1px solid var(--bd); }

    /* saving indicator */
    .saving {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: var(--s2); border: 1px solid var(--bd2);
      border-radius: 100px; padding: 6px 16px;
      font-size: 0.75rem; color: var(--txt2);
      display: flex; align-items: center; gap: 6px;
      opacity: 0; transition: opacity .25s;
      pointer-events: none; z-index: 400;
      white-space: nowrap;
    }
    .saving.show { opacity: 1; }
    .saving .material-icons { font-size: 0.85rem; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════
       MOBILE — stack vertically
    ════════════════════════════════ */
    @media (max-width: 680px) {
      /* topbar — hide progress text on tiny screens */
      .tb-prog { display: none; }

      /* stack: grid on top, question below */
      .content {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      /* grid panel — horizontal scroll strip at top */
      .grid-panel {
        position: static;
        height: auto;
        border-bottom: 1px solid var(--bd);
        padding: 12px 14px;
      }

      /* wider grid on mobile so numbers are readable */
      .q-grid {
        grid-template-columns: repeat(10, 1fr);
        gap: 3px;
      }

      /* hide legend on mobile — saves space */
      .gp-legend { display: none; }

      /* question panel — full width, comfortable padding */
      .q-panel {
        padding: 20px 16px 80px;
        border-right: none;
      }

      .q-text { font-size: 0.95rem; }

      .opt { padding: 12px 13px; }

      /* nav buttons — fill width */
      .q-nav { justify-content: space-between; }
      .nav-btn { flex: 1; justify-content: center; }
    }

    /* very small phones */
    @media (max-width: 380px) {
      .topbar { padding: 0 12px; gap: 8px; }
      .tb-submit span:last-child { display: none; } /* icon only */
      .tb-submit { padding: 7px 10px; }
      .timer { padding: 5px 8px; font-size: 0.88rem; }
    }
  </style>
</head>
<body>

  {# data for JS #}
  <div id="qd"
       data-session-id="{{ quiz_sess.id }}"
       data-total="{{ total }}"
       data-mode="{{ quiz_sess.mode }}"
       data-time-limit="{{ quiz_sess.time_limit_minutes or '' }}"
       data-started="{{ quiz_sess.started_at }}"
       style="display:none"></div>

  <script>
    const QUESTIONS = {{ questions | tojson }};
    const ANSWERS   = {{ answers   | tojson }};
  </script>

  <!-- ══ TOP BAR ══ -->
  <div class="topbar">
    <div class="tb-title">
      <em>U-NEX</em> &nbsp;·&nbsp; {{ quiz_sess.course_code or 'Quiz' }}
    </div>

    {% if quiz_sess.time_limit_minutes %}
    <div class="timer" id="timer">
      <span class="material-icons">timer</span>
      <span id="timerDisplay">--:--</span>
    </div>
    {% endif %}

    <div class="tb-prog">
      <strong id="answeredCount">{{ answered_count }}</strong>/{{ total }}
    </div>

    <button class="tb-submit" onclick="confirmSubmit()">
      <span class="material-icons">send</span>
      <span>Submit</span>
    </button>
  </div>

  <!-- progress bar -->
  <div class="prog-bar-wrap">
    <div class="prog-bar-fill" id="progFill" style="width:0%"></div>
  </div>

  <div class="page">
    <div class="content">

      <!-- ── QUESTION PANEL ── -->
      <div class="q-panel" id="qPanel">
        <div class="q-header">
          <span class="q-num" id="qNum">Question 1 of {{ total }}</span>
          <span class="q-badge qb-course" id="qCourse"></span>
          <span class="q-badge" id="qDiff"></span>
        </div>

        <div class="q-text" id="qText"></div>

        <div class="options" id="optionsContainer"></div>

        <div class="practice-expl" id="practiceExpl">
          <strong>Explanation:</strong> <span id="explText"></span>
        </div>

        <div class="q-nav">
          <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>
            <span class="material-icons">arrow_back</span> Prev
          </button>
          <button class="nav-btn primary" id="nextBtn" onclick="navigate(1)">
            Next <span class="material-icons">arrow_forward</span>
          </button>
        </div>
      </div>

      <!-- ── GRID PANEL ── -->
      <div class="grid-panel">
        <div class="gp-label">Questions</div>
        <div class="q-grid" id="qGrid"></div>
        <div class="gp-legend">
          <div class="leg"><div class="leg-dot ld-now"></div> Current</div>
          <div class="leg"><div class="leg-dot ld-done"></div> Answered</div>
          <div class="leg"><div class="leg-dot ld-skip"></div> Unanswered</div>
        </div>
      </div>

    </div>
  </div>

  <!-- saving indicator -->
  <div class="saving" id="savingInd">
    <span class="material-icons">sync</span> Saving…
  </div>

  <!-- hidden submit form -->
  <form method="POST"
        action="{{ url_for('quiz_submit', session_id=quiz_sess.id) }}"
        id="submitForm"></form>

  <script>
    const qd         = document.getElementById('qd');
    const SESSION_ID = parseInt(qd.dataset.sessionId);
    const TOTAL      = parseInt(qd.dataset.total);
    const MODE       = qd.dataset.mode;
    const TIME_LIMIT = qd.dataset.timeLimit ? parseInt(qd.dataset.timeLimit) : null;
    const STARTED_AT = qd.dataset.started;

    let currentIdx = 0;
    const localAnswers = {};
    Object.entries(ANSWERS).forEach(([qid, sel]) => {
      if (sel) localAnswers[parseInt(qid)] = sel;
    });

    /* ── BUILD GRID ── */
    const grid = document.getElementById('qGrid');
    QUESTIONS.forEach((q, i) => {
      const c = document.createElement('div');
      c.className = 'gq';
      c.id = `gq-${i}`;
      c.textContent = i + 1;
      c.addEventListener('click', () => goTo(i));
      grid.appendChild(c);
    });

    /* ── RENDER ── */
    function render(idx) {
      const q = QUESTIONS[idx];
      if (!q) return;
      currentIdx = idx;

      document.getElementById('qNum').textContent = `Question ${idx + 1} of ${TOTAL}`;
      document.getElementById('qText').textContent = q.question_text;

      const ce = document.getElementById('qCourse');
      ce.textContent = q.course_code;

      const de = document.getElementById('qDiff');
      de.textContent = q.difficulty;
      de.className = `q-badge qb-${q.difficulty}`;

      // build options
      const box = document.getElementById('optionsContainer');
      box.innerHTML = '';
      ['a','b','c','d'].forEach(ltr => {
        const txt = q.options[ltr];
        if (!txt) return;
        const div = document.createElement('div');
        div.className = 'opt' + (localAnswers[q.question_id] === ltr ? ' selected' : '');
        div.dataset.ltr = ltr;
        div.innerHTML = `<div class="opt-ltr">${ltr.toUpperCase()}</div><div class="opt-text">${txt}</div>`;
        div.addEventListener('click', () => pick(idx, ltr));
        box.appendChild(div);
      });

      document.getElementById('practiceExpl').classList.remove('show');

      // nav
      const prev = document.getElementById('prevBtn');
      const next = document.getElementById('nextBtn');
      prev.disabled = idx === 0;
      if (idx === TOTAL - 1) {
        next.disabled = true;
        next.innerHTML = 'Last Question';
      } else {
        next.disabled = false;
        next.innerHTML = 'Next <span class="material-icons">arrow_forward</span>';
      }

      updateGrid();
      updateProgress();
    }

    function updateGrid() {
      QUESTIONS.forEach((q, i) => {
        const c = document.getElementById(`gq-${i}`);
        c.className = i === currentIdx ? 'gq current'
                    : localAnswers[q.question_id] ? 'gq answered'
                    : 'gq';
      });
    }

    function updateProgress() {
      const pct = (Object.keys(localAnswers).length / TOTAL) * 100;
      document.getElementById('progFill').style.width = pct + '%';
    }

    /* ── PICK OPTION ── */
    function pick(idx, ltr) {
      const q = QUESTIONS[idx];
      localAnswers[q.question_id] = ltr;

      document.querySelectorAll('#optionsContainer .opt').forEach(o => {
        o.classList.toggle('selected', o.dataset.ltr === ltr);
        o.classList.remove('correct-ans', 'wrong-ans');
      });

      document.getElementById('answeredCount').textContent = Object.keys(localAnswers).length;
      updateGrid();
      updateProgress();
      saveAnswer(q.question_id, ltr, idx);
    }

    /* ── SAVE ── */
    let saveTimer = null;
    function saveAnswer(qid, ltr, idx) {
      showSaving(true);
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        fetch('/user/quiz/answer', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            session_id:      SESSION_ID,
            question_id:     qid,
            selected_option: ltr
          })
        })
        .then(r => r.json())
        .then(data => {
          showSaving(false);
          if (MODE === 'practice' && data.success) {
            showFeedback(idx, ltr, data.is_correct);
          }
        })
        .catch(() => showSaving(false));
      }, 200);
    }

    function showFeedback(idx, ltr, correct) {
      if (MODE !== 'practice') return;
      document.querySelectorAll('#optionsContainer .opt').forEach(o => {
        if (o.dataset.ltr === ltr) {
          o.classList.add(correct ? 'correct-ans' : 'wrong-ans');
          o.classList.remove('selected');
        }
      });
      const expl = document.getElementById('practiceExpl');
      document.getElementById('explText').textContent =
        correct ? 'Correct! Well done.' : 'Incorrect. Review your notes on this topic.';
      expl.classList.add('show');
    }

    function showSaving(show) {
      document.getElementById('savingInd').classList.toggle('show', show);
    }

    /* ── NAV ── */
    function navigate(dir) {
      const n = currentIdx + dir;
      if (n >= 0 && n < TOTAL) goTo(n);
    }
    function goTo(idx) {
      render(idx);
      document.getElementById('qPanel').scrollTop = 0;
      /* on mobile, scroll grid panel into view */
      if (window.innerWidth <= 680) {
        document.querySelector('.grid-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    /* ── TIMER ── */
    if (TIME_LIMIT) {
      const timerEl = document.getElementById('timer');
      const display = document.getElementById('timerDisplay');
      const startMs = new Date(STARTED_AT.replace(' ','T') + (STARTED_AT.includes('+') ? '' : 'Z')).getTime();
      const endMs   = startMs + TIME_LIMIT * 60000;
      let w5 = false, w1 = false;

      function tick() {
        const rem  = Math.max(0, endMs - Date.now());
        const m    = Math.floor(rem / 60000);
        const s    = Math.floor((rem % 60000) / 1000);
        display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

        if (rem <= 0) {
          timerEl.className = 'timer crit';
          clearInterval(iv);
          document.getElementById('submitForm').submit();
          return;
        }
        if (!w5 && rem <= 300000) {
          w5 = true; timerEl.className = 'timer crit';
          warn('⏰ 5 minutes left — start wrapping up.');
        } else if (!w1 && rem <= 60000) {
          w1 = true;
          warn('🚨 1 minute left — submit now!');
        } else if (rem > 300000 && rem <= 900000) {
          timerEl.className = 'timer warn';
        }
      }

      function warn(msg) {
        const w = document.createElement('div');
        w.textContent = msg;
        w.style.cssText = [
          'position:fixed','top:66px','left:50%','transform:translateX(-50%)',
          'background:#1e2333','border:1px solid rgba(249,115,22,0.4)',
          'color:#eef0f6','padding:11px 22px','border-radius:11px',
          'font-size:.88rem','font-weight:600','z-index:9999',
          'box-shadow:0 8px 28px rgba(0,0,0,0.6)',
          'pointer-events:none','white-space:nowrap'
        ].join(';');
        document.body.appendChild(w);
        setTimeout(() => { w.style.transition='opacity .4s'; w.style.opacity='0';
          setTimeout(() => w.remove(), 400); }, 4000);
      }

      tick();
      const iv = setInterval(tick, 1000);
    }

    /* ── SUBMIT ── */
    function confirmSubmit() {
      const done = Object.keys(localAnswers).length;
      const left = TOTAL - done;
      let msg = `Submit your quiz?\n\nAnswered: ${done} / ${TOTAL}`;
      if (left > 0) msg += `\nUnanswered: ${left} (marked wrong)`;
      if (confirm(msg)) document.getElementById('submitForm').submit();
    }

    /* ── INIT ── */
    render(0);
    updateProgress();
  </script>
